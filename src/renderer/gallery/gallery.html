<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta http-equiv="Content-Security-Policy" content="default-src 'self'; script-src 'self'; style-src 'self' 'unsafe-inline'; img-src 'self' data:" />
  <link rel="stylesheet" href="gallery.css" />
  <title>Captor</title>
</head>
<body>
  <div class="sidebar">
    <div class="logo">
      <svg viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg">
        <path d="M3 9V6a1 1 0 011-1h3M3 15v3a1 1 0 001 1h3M21 9V6a1 1 0 00-1-1h-3M21 15v3a1 1 0 01-1 1h-3" stroke="currentColor" stroke-width="2" stroke-linecap="round"/>
        <circle cx="12" cy="12" r="3" stroke="currentColor" stroke-width="2"/>
      </svg>
      <span>Captor</span>
    </div>

    <div class="search-wrap">
      <input id="searchInput" type="text" placeholder="Search notes..." />
    </div>

    <div class="section-label">Tags</div>
    <div id="tagList" class="tag-list">
      <button class="tag-pill active" data-tag="__all__">All</button>
    </div>

    <div class="spacer"></div>
    <div class="count" id="countLabel">0 highlights</div>
  </div>

  <div class="main">
    <div class="toolbar">
      <span class="toolbar-title" id="viewTitle">All Highlights</span>
      <select id="sortSelect">
        <option value="newest">Newest first</option>
        <option value="oldest">Oldest first</option>
      </select>
    </div>

    <div id="grid" class="grid"></div>
    <div id="emptyState" class="empty-state" style="display:none">
      <div class="empty-icon">
        <svg viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg">
          <path d="M3 9V6a1 1 0 011-1h3M3 15v3a1 1 0 001 1h3M21 9V6a1 1 0 00-1-1h-3M21 15v3a1 1 0 01-1 1h-3" stroke="currentColor" stroke-width="2" stroke-linecap="round"/>
          <circle cx="12" cy="12" r="3" stroke="currentColor" stroke-width="2"/>
        </svg>
      </div>
      <p>No highlights yet.</p>
      <p class="sub">Press <kbd>Cmd+Shift+H</kbd> or click the floating button to capture your first highlight.</p>
    </div>
  </div>

  <!-- Lightbox -->
  <div id="lightbox" class="lightbox" style="display:none">
    <div class="lightbox-backdrop"></div>
    <div class="lightbox-content">
      <button class="lightbox-close">&times;</button>
      <img id="lightboxImg" alt="" />
      <div class="lightbox-meta">
        <p id="lightboxNote"></p>
        <div id="lightboxTags" class="lightbox-tags"></div>
        <div id="lightboxOcrBlock" class="lightbox-ocr-block" style="display:none">
          <div class="lightbox-ocr-label">Extracted Text <span class="ocr-badge">OCR</span></div>
          <pre id="lightboxOcrText" class="lightbox-ocr-text"></pre>
        </div>
        <p id="lightboxDate" class="lightbox-date"></p>
      </div>
    </div>
  </div>

  <script src="gallery.js"></script>
</body>
</html>
