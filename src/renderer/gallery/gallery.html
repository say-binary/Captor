<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta http-equiv="Content-Security-Policy" content="default-src 'self'; script-src 'self'; style-src 'self' 'unsafe-inline'; img-src 'self' data:" />
  <link rel="stylesheet" href="gallery.css" />
  <title>Captor</title>
</head>
<body>
  <div class="sidebar">
    <div class="logo">
      <svg viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg">
        <path d="M3 9V6a1 1 0 011-1h3M3 15v3a1 1 0 001 1h3M21 9V6a1 1 0 00-1-1h-3M21 15v3a1 1 0 01-1 1h-3" stroke="currentColor" stroke-width="2" stroke-linecap="round"/>
        <circle cx="12" cy="12" r="3" stroke="currentColor" stroke-width="2"/>
      </svg>
      <span>Captor</span>
    </div>

    <div class="search-wrap">
      <input id="searchInput" type="text" placeholder="Search notes..." />
    </div>

    <!-- Folder section -->
    <div class="section-label">Save Folder</div>
    <div class="folder-picker">
      <div id="activeFolderLabel" class="active-folder-label">Default (App Data)</div>
      <button id="chooseFolderBtn" class="btn-choose-folder" title="Choose folder">
        <svg viewBox="0 0 20 20" fill="none"><path d="M2 6a2 2 0 012-2h4l2 2h6a2 2 0 012 2v6a2 2 0 01-2 2H4a2 2 0 01-2-2V6z" stroke="currentColor" stroke-width="1.5"/></svg>
        Change
      </button>
    </div>
    <div id="folderTree" class="folder-tree"></div>

    <!-- Tags section -->
    <div class="section-label" style="margin-top:8px">Tags</div>
    <div id="tagList" class="tag-list">
      <button class="tag-pill active" data-tag="__all__">All</button>
    </div>

    <div class="spacer"></div>
    <div class="count" id="countLabel">0 highlights</div>
  </div>

  <div class="main">
    <div class="toolbar">
      <span class="toolbar-title" id="viewTitle">All Highlights</span>
      <select id="sortSelect">
        <option value="newest">Newest first</option>
        <option value="oldest">Oldest first</option>
      </select>
    </div>

    <div id="grid" class="grid"></div>
    <div id="emptyState" class="empty-state" style="display:none">
      <div class="empty-icon">
        <svg viewBox="0 0 24 24" fill="none">
          <path d="M3 9V6a1 1 0 011-1h3M3 15v3a1 1 0 001 1h3M21 9V6a1 1 0 00-1-1h-3M21 15v3a1 1 0 01-1 1h-3" stroke="currentColor" stroke-width="2" stroke-linecap="round"/>
          <circle cx="12" cy="12" r="3" stroke="currentColor" stroke-width="2"/>
        </svg>
      </div>
      <p>No highlights yet.</p>
      <p class="sub">Press <kbd>Cmd+Shift+H</kbd> or click the floating button to capture your first highlight.</p>
    </div>
  </div>

  <!-- Lightbox / Edit panel -->
  <div id="lightbox" class="lightbox" style="display:none">
    <div class="lightbox-backdrop"></div>
    <div class="lightbox-content">
      <div class="lightbox-header">
        <span id="lightboxDate" class="lightbox-date"></span>
        <div class="lightbox-header-actions">
          <button id="lightboxDeleteBtn" class="btn-delete" title="Delete">
            <svg viewBox="0 0 16 16" fill="none" width="13" height="13">
              <path d="M2 4h12M5 4V2.5a.5.5 0 01.5-.5h5a.5.5 0 01.5.5V4M6 7v5M10 7v5M3 4l1 9.5a.5.5 0 00.5.5h7a.5.5 0 00.5-.5L13 4" stroke="currentColor" stroke-width="1.4" stroke-linecap="round" stroke-linejoin="round"/>
            </svg>
            Delete
          </button>
          <button class="lightbox-close">&times;</button>
        </div>
      </div>

      <img id="lightboxImg" alt="" />

      <div class="lightbox-meta">
        <!-- Editable highlighted text (text-highlight type only) -->
        <div id="lightboxHighlightBlock" style="display:none">
          <div class="lightbox-field-label">Highlighted Text</div>
          <textarea id="lightboxHighlightText" class="lightbox-textarea" rows="4" placeholder="Highlighted text..."></textarea>
          <div class="lightbox-field-label" style="margin-top:8px">Source URL</div>
          <input id="lightboxSourceUrl" class="lightbox-input" type="text" placeholder="Source URL (optional)" />
        </div>

        <div class="lightbox-field-label" style="margin-top:8px">Note</div>
        <textarea id="lightboxNote" class="lightbox-textarea" rows="3" placeholder="Add a note..."></textarea>

        <div class="lightbox-field-label" style="margin-top:10px">
          Tags <span class="lightbox-field-hint">(comma separated)</span>
        </div>
        <input id="lightboxTagsInput" class="lightbox-input" type="text" placeholder="e.g. ux, pricing, inspiration" />

        <div class="lightbox-actions">
          <button id="lightboxCancelBtn" class="btn-secondary">Cancel</button>
          <button id="lightboxSaveBtn" class="btn-primary">Save Changes</button>
        </div>
      </div>
    </div>
  </div>

  <script src="gallery.js"></script>
</body>
</html>
