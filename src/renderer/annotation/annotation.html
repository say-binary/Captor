<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta http-equiv="Content-Security-Policy" content="default-src 'self'; script-src 'self'; style-src 'self' 'unsafe-inline'; img-src 'self' data:" />
  <link rel="stylesheet" href="annotation.css" />
  <title>Save Highlight</title>
</head>
<body>
  <div class="container">
    <!-- Screenshot preview -->
    <div id="imgPreviewWrap" class="preview-wrap">
      <img id="preview" alt="Captured highlight" />
    </div>
    <!-- Text highlight preview -->
    <div id="textPreviewWrap" class="text-preview-wrap" style="display:none">
      <div class="text-preview-label">Selected Text</div>
      <blockquote id="textPreview" class="text-preview"></blockquote>
      <div id="sourceUrlPreview" class="source-url-preview"></div>
    </div>

    <div class="form">
      <label for="note">Note</label>
      <textarea id="note" placeholder="What is this about?" rows="3"></textarea>

      <label for="tags">Tags <span class="hint">(comma-separated)</span></label>
      <input id="tags" type="text" placeholder="e.g. ux, pricing, inspiration" />

      <div class="actions">
        <button id="cancelBtn" class="btn-cancel">Cancel</button>
        <button id="saveBtn" class="btn-save">Save Highlight</button>
      </div>
    </div>
  </div>
  <script src="annotation.js"></script>
</body>
</html>
